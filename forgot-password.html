 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PPT</title>
  <!-- Font Awesome (only one version needed) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer"/>

  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">

<link rel="shortcut icon" href="./image/favicon.io/logo sign 2.png" type="image/x-icon" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
  <link rel="stylesheet" href="css/style.css">

  <style>
    body {
      background-color: #f4f5f7;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }
  </style>
</head>
<body>

  <div class="forgot-box">

    <h2 class="title-password is-4">Forgot Password</h2>
    <p class="info-text">Enter your email address and we’ll send you a link to reset your password.</p>

    <form id="forgotPasswordForm">
      <div class="field">
        <label class="label">Email Address</label>
        <div class="control has-icons-left">
          <input class="input" type="email" id="email" placeholder="Enter your registered email" required>
          <span class="icon is-small is-left"><i class="fas fa-envelope"></i></span>
        </div>
      </div>

      <div class="field">
        <button type="submit" class="button is-primary is-fullwidth">
          <span class="icon"><i class="fas fa-paper-plane"></i></span>
          <span>Send Reset Link</span>
        </button>
      </div>

      <p class="success-message" id="successMessage">
        ✅ Reset link sent to your email!
      </p>

      <div class="back-login">
        <a href="input.html"><i class="fas fa-arrow-left"></i> Back to Login</a>
      </div>
    </form>
  </div>

  <script src="js/forgot-password.js" ></script>
   <script src="js/script.js" ></script>
</body>
</html>
