  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PPT Admin Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
  <style>
    .hidden { display: none; }
    .small { font-size: 0.9rem; color: #555; }
    .verified { color: green; font-weight: bold; }
    .expired { background-color: #ffe5e5; }
    .completed { background-color: #e5ffe5; }
  </style>
</head>
<body class="p-5">

  <div id="loginBox" class="box mt-6" style="max-width:400px; margin:auto;">
    <h2 class="title is-4">Admin Login</h2>
    <input id="pw" class="input mb-3" type="password" placeholder="Enter admin password">
    <button id="loginBtn" class="button is-link is-fullwidth">Login</button>
    <p id="loginError" class="has-text-danger hidden mt-2">Invalid password.</p>
  </div>

  <div id="dash" class="hidden ml-6 mr-6">
    <div class="level">
      <div class="level-left">
        <h2 class="title is-4">Admin Dashboard</h2>
      </div>
      <div class="level-right">
        <span id="who" class="mr-4"></span>
        <button id="logoutBtn" class="button is-danger is-small">Logout</button>
      </div>
    </div>

    <!-- Admin Post Free Task -->
    <div class="box">
      <h3 class="subtitle is-5">Post Free Task</h3>
      <input id="aTitle" class="input mb-2" placeholder="Task Title (e.g. Follow Page)">
      <input id="aLink" class="input mb-2" placeholder="Task Link (https://...)">
      <input id="aBudget" class="input mb-2" placeholder="Budget ($)" type="number" step="0.01">
      <input id="aCount" class="input mb-2" placeholder="Count (No. of Users)" type="number">
      <button id="aPost" class="button is-success">Post Task (Free)</button>
    </div>

    <!-- Task List -->
    <div class="box">
      <div class="is-flex is-justify-content-space-between is-align-items-center">
        <h3 class="subtitle is-5">All Tasks</h3>
        <div>
          <label><strong>Filter:</strong></label>
          <select id="taskFilter" class="select is-small ml-2">
            <option value="all">All</option>
            <option value="active">Active</option>
            <option value="completed">Completed</option>
            <option value="expired">Expired</option>
          </select>
        </div>
      </div>
      <div id="taskList" class="mt-3"></div>
    </div>


    

    <!-- User Management -->
    <div class="field mt-4">
  <label class="label">Search User</label>
  <div class="control">
    <input id="searchUser" class="input" type="text" placeholder="Search by name...">
  </div>
</div>
<div id="userList"></div>

    <!-- Finance -->
    <div id="financeBox" class="box hidden">
      <h3 class="subtitle is-5">Finance</h3>
      <button id="payEligible" class="button is-link mb-3">Pay Eligible Users ($10+)</button>
      <div id="payHistory"></div>
    </div>
  </div>

  <script src="js/admin.js" ></script>
