<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PPT</title>
  <!-- Font Awesome (only one version needed) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer"/>

  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">

<link rel="shortcut icon" href="./image/favicon.io/logo sign 2.png" type="image/x-icon" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <section class="section">
    <div class="container">
      <div class="profile-card">
            <a href="#" onclick="goBack()" class="button is-light m-4">&larr; Back</a>
        <h2 class="title has-text-centered has-text-dark mb-4">
          <i class="fas fa-user-edit mr-2"></i>Edit Profile
        </h2>

        <!-- Profile Picture -->
        <div class="profile-image-preview" id="imagePreview">
          <img src="https://via.placeholder.com/100" alt="Profile" id="previewImg">
        </div>
        <div class="file is-boxed is-centered mb-4">
          <label class="file-label">
            <input class="file-input" type="file" name="profile" id="profileUpload" accept="image/*">
            <span class="file-cta">
              <span class="file-icon">
                <i class="fas fa-upload"></i>
              </span>
              <span class="file-label">Upload Profile Picture</span>
            </span>
          </label>
        </div>

        <!-- Form -->
        <form id="editProfileForm">
          <div class="field">
            <label class="label">Full Name</label>
            <div class="control has-icons-left">
              <input class="input" type="text" id="fullName" placeholder="Enter your full name" required>
              <span class="icon is-small is-left">
                <i class="fas fa-user"></i>
              </span>
            </div>
          </div>

          <div class="field">
            <label class="label">Email</label>
            <div class="control has-icons-left">
              <input class="input" type="email" id="email" placeholder="Enter your email" required>
              <span class="icon is-small is-left">
                <i class="fas fa-envelope"></i>
              </span>
            </div>
          </div>

          <div class="field has-text-centered mt-4">
            <button type="button" class="button verify-btn" id="verifyAccountBtn">
              <i class="fas fa-check-circle mr-2"></i> Verify Account
            </button>
          </div>

          <!-- Points & Earnings -->
          <div class="points-section mt-4">
            <p class="is-size-5 mb-2"><strong>My Earnings & Points</strong></p>
            <p><i class="fas fa-coins mr-1"></i> Points: <strong id="userPoints">12,500</strong></p>
            <p><i class="fas fa-dollar-sign mr-1"></i> Earnings: <strong id="userEarnings">$1.25</strong></p>
          </div>

          <div class="field has-text-centered mt-5">
            <button type="submit" class="button is-primary is-medium">
              <i class="fas fa-save mr-2"></i> Save Changes
            </button>
          </div>
        </form>
      </div>
    </div>
  </section>

  
  <script src="js/edit-profile.js" ></script>

  <script src="js/script.js"></script>

</body>
</html>
