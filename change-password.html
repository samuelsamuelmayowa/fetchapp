  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PPT</title>
  <!-- Font Awesome (only one version needed) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer"/>

  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">

<link rel="shortcut icon" href="./image/favicon.io/logo sign 2.png" type="image/x-icon" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
  <link rel="stylesheet" href="css/style.css">
  
  <style>
    body {
      background-color: #f4f5f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>

  <div class="change-password-boxes">
     <a href="#" onclick="goBack()" class="button is-light m-4">&larr; Back</a>
    <h2 class="titles is-4">Change Password</h2>
    <form id="changePasswordForm">
      <!-- Old Password -->
      <div class="field">
        <label class="label">Old Password</label>
        <div class="control has-icons-left">
          <input class="input" type="password" id="oldPassword" placeholder="Enter your old password" required>
          <span class="icon is-small is-left"><i class="fas fa-lock"></i></span>
        </div>
      </div>

      <!-- New Password -->
      <div class="field">
        <label class="label">New Password</label>
        <div class="control has-icons-left">
          <input class="input" type="password" id="newPassword" placeholder="Enter a new password" required minlength="6">
          <span class="icon is-small is-left"><i class="fas fa-key"></i></span>
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="field">
        <label class="label">Confirm New Password</label>
        <div class="control has-icons-left">
          <input class="input" type="password" id="confirmPassword" placeholder="Confirm new password" required>
          <span class="icon is-small is-left"><i class="fas fa-check"></i></span>
        </div>
      </div>

      <!-- Submit Button -->
      <div class="field">
        <button type="submit" class="button  is-primary is-fullwidth">
          <span class="icon"><i class="fas fa-save"></i></span>
          <span>Update Password</span>
        </button>
      </div>

      <p class="success-message" id="successMessage">
        ✅ Password updated successfully!
      </p>
    </form>
  </div>

  <script src="js/script.js" ></script>
  <script src="js/change-password.js" ></script>

</body>
</html>
